<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-labelledby="title desc">
  <title id="title">xoxma1993 cyber profile banner</title>
  <desc id="desc">Terminal inspired animated banner for the GitHub profile of xoxma1993.</desc>
  <defs>
    <style>
      .bg { fill: #060a0f; }
      .grid { stroke: #0d1620; stroke-width: 1; }
      .scan-line { fill: none; stroke: #00ff9d; stroke-width: 0.35; opacity: 0.05; }
      .corner-line { stroke: #00d4ff; stroke-width: 1.5; fill: none; opacity: 0.9; }
      .bracket-dim { fill: none; stroke: #00d4ff; stroke-width: 1; stroke-linecap: square; opacity: 0.28; }
      .divider { stroke: #112233; stroke-width: 1; }
      .title { font-family: Consolas, 'Courier New', monospace; font-size: 72px; fill: #ffffff; letter-spacing: 4px; }
      .title-glow { font-family: Consolas, 'Courier New', monospace; font-size: 72px; fill: none; stroke: #00d4ff; stroke-width: 0.9; letter-spacing: 4px; opacity: 0.58; }
      .label { font-family: Consolas, 'Courier New', monospace; font-size: 12px; fill: #00d4ff; letter-spacing: 2px; }
      .desc-text { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #7ecfff; letter-spacing: 0.8px; }
      .prompt { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #536273; }
      .prompt-path { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #1ed88f; }
      .prompt-branch { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #00d4ff; }
      .tag { font-family: Consolas, 'Courier New', monospace; font-size: 10px; fill: #071018; letter-spacing: 0.7px; }
      .tag-bg-blue { fill: #00d4ff; }
      .tag-bg-green { fill: #00c87a; }
      .tag-bg-orange { fill: #ff8c42; }
      .cursor { fill: #00d4ff; animation: blink 1.05s step-end infinite; }
      .dot-active { fill: #00d4ff; animation: pulse 2.1s ease-in-out infinite; }
      .dot-green { fill: #00ff9d; animation: pulse 2s ease-in-out infinite; }
      .pulse-line { fill: none; stroke: #00d4ff; stroke-width: 1.2; opacity: 0.38; }
      .pulse-line-dim { fill: none; stroke: #00ff9d; stroke-width: 0.8; opacity: 0.14; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>

    <linearGradient id="lineGlow" x1="32" y1="160" x2="540" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="0.5" stop-color="#00d4ff" stop-opacity="1" />
      <stop offset="1" stop-color="#00ff9d" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect class="bg" width="900" height="280" rx="8" />

  <line class="grid" x1="0" y1="56" x2="900" y2="56" />
  <line class="grid" x1="0" y1="178" x2="900" y2="178" />
  <line class="grid" x1="560" y1="56" x2="560" y2="254" />

  <line class="scan-line" x1="0" y1="20" x2="900" y2="20" />
  <line class="scan-line" x1="0" y1="40" x2="900" y2="40" />
  <line class="scan-line" x1="0" y1="60" x2="900" y2="60" />
  <line class="scan-line" x1="0" y1="80" x2="900" y2="80" />
  <line class="scan-line" x1="0" y1="100" x2="900" y2="100" />
  <line class="scan-line" x1="0" y1="120" x2="900" y2="120" />
  <line class="scan-line" x1="0" y1="140" x2="900" y2="140" />
  <line class="scan-line" x1="0" y1="160" x2="900" y2="160" />
  <line class="scan-line" x1="0" y1="180" x2="900" y2="180" />
  <line class="scan-line" x1="0" y1="200" x2="900" y2="200" />
  <line class="scan-line" x1="0" y1="220" x2="900" y2="220" />
  <line class="scan-line" x1="0" y1="240" x2="900" y2="240" />
  <line class="scan-line" x1="0" y1="260" x2="900" y2="260" />

  <polyline class="corner-line" points="22,10 10,10 10,22" />
  <polyline class="corner-line" points="878,10 890,10 890,22" />
  <polyline class="corner-line" points="22,270 10,270 10,258" />
  <polyline class="corner-line" points="878,270 890,270 890,258" />

  <polyline class="bracket-dim" points="34,20 22,20 22,32" />
  <polyline class="bracket-dim" points="866,20 878,20 878,32" />
  <polyline class="bracket-dim" points="34,260 22,260 22,248" />
  <polyline class="bracket-dim" points="866,260 878,260 878,248" />

  <circle class="dot-green" cx="818" cy="39" r="3.8" />
  <text class="label" x="28" y="44">// PROFILE_INTERFACE</text>
  <text class="label" x="806" y="44" text-anchor="end">ONLINE</text>

  <line class="divider" x1="28" y1="55" x2="872" y2="55" />

  <path class="pulse-line-dim" d="M34 164C130 138 208 150 288 142C362 134 420 116 496 118C516 118 532 120 548 124">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M34 164C130 138 208 150 288 142C362 134 420 116 496 118C516 118 532 120 548 124;
              M34 156C134 146 214 136 298 130C372 126 430 126 500 132C516 134 530 138 548 142;
              M34 164C130 138 208 150 288 142C362 134 420 116 496 118C516 118 532 120 548 124" />
  </path>

  <path class="pulse-line" stroke="url(#lineGlow)" d="M34 152C124 148 206 118 284 120C370 122 430 140 548 136">
    <animate attributeName="d" dur="6.8s" repeatCount="indefinite"
      values="M34 152C124 148 206 118 284 120C370 122 430 140 548 136;
              M34 138C122 120 198 144 282 146C370 148 436 124 548 128;
              M34 152C124 148 206 118 284 120C370 122 430 140 548 136" />
  </path>

  <g filter="url(#softGlow)">
    <text class="title-glow" x="36" y="152">xoxma1993</text>
  </g>
  <text class="title" x="36" y="152">xoxma1993</text>

  <text class="desc-text" x="38" y="188">AI SYSTEMS  .  WEB3  .  PREMIUM INTERFACES</text>

  <text class="desc-text" x="582" y="96">AI Engineer</text>
  <text class="desc-text" x="582" y="116">TRON  .  EVM  .  DeFi</text>
  <text class="desc-text" x="582" y="136">Full-Stack Builder</text>

  <rect class="tag-bg-blue" x="582" y="150" width="78" height="17" rx="2" />
  <text class="tag" x="621" y="162" text-anchor="middle">Blockchain</text>

  <rect class="tag-bg-green" x="668" y="150" width="56" height="17" rx="2" />
  <text class="tag" x="696" y="162" text-anchor="middle">AI Ops</text>

  <rect class="tag-bg-orange" x="732" y="150" width="62" height="17" rx="2" />
  <text class="tag" x="763" y="162" text-anchor="middle">Node.js</text>

  <line class="divider" x1="28" y1="178" x2="872" y2="178" />

  <text class="prompt" x="36" y="208">~</text>
  <text class="prompt-path" x="50" y="208">/xoxma1993</text>
  <text class="prompt" x="138" y="208">[</text>
  <text class="prompt-branch" x="146" y="208">main</text>
  <text class="prompt" x="178" y="208">]</text>
  <text class="prompt" x="192" y="208">&gt;</text>
  <rect class="cursor" x="204" y="196" width="8" height="14" />

  <text class="prompt" x="28" y="248">Logged in as:</text>
  <text class="prompt-path" x="108" y="248">Bigidron</text>
  <text class="prompt" x="180" y="248">.</text>
  <text class="label" x="194" y="248">Ukraine</text>

  <text class="prompt" x="750" y="248" text-anchor="end">v3.0.0</text>
  <text class="label" x="756" y="248">BUILD</text>
  <circle class="dot-active" cx="820" cy="243" r="3" />
  <text class="label" x="828" y="248">READY</text>
</svg>
