<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-labelledby="title desc">
  <title id="title">Bigidron retro terminal cyberpunk banner</title>
  <desc id="desc">A retro terminal inspired luxury cyberpunk animated banner for the GitHub profile of Bigidron.</desc>
  <defs>
    <style>
      .bg { fill: #05070b; }
      .frame { fill: none; stroke: #173042; stroke-width: 1; }
      .scan { stroke: #00ffa6; stroke-width: 0.45; opacity: 0.05; }
      .grid { stroke: #0d1823; stroke-width: 1; }
      .accent { stroke: #00d4ff; }
      .accent2 { stroke: #ff4fd8; }
      .accent3 { stroke: #00ffa6; }
      .label { font-family: Consolas, 'Courier New', monospace; font-size: 12px; letter-spacing: 2px; fill: #7fd6ff; }
      .small { font-family: Consolas, 'Courier New', monospace; font-size: 11px; letter-spacing: 1.4px; fill: #5f7283; }
      .title { font-family: Consolas, 'Courier New', monospace; font-size: 92px; letter-spacing: 6px; fill: #f7fbff; }
      .titleGlow { font-family: Consolas, 'Courier New', monospace; font-size: 92px; letter-spacing: 6px; fill: none; stroke: #00d4ff; stroke-width: 1; opacity: 0.55; }
      .subtitle { font-family: Consolas, 'Courier New', monospace; font-size: 16px; letter-spacing: 2px; fill: #93cfff; }
      .status { font-family: Consolas, 'Courier New', monospace; font-size: 13px; letter-spacing: 1.5px; fill: #d5f6ff; }
      .prompt { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #4f6170; }
      .path { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #00ffa6; }
      .branch { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #00d4ff; }
      .chipText { font-family: Consolas, 'Courier New', monospace; font-size: 11px; letter-spacing: 0.8px; fill: #041019; }
      .metricLabel { font-family: Consolas, 'Courier New', monospace; font-size: 11px; fill: #7fd6ff; }
      .metricValue { font-family: Consolas, 'Courier New', monospace; font-size: 18px; fill: #f8fbff; }
      .cursor { fill: #00d4ff; animation: blink 1.05s step-end infinite; }
      .pulseBlue { fill: #00d4ff; animation: pulse 2.2s ease-in-out infinite; }
      .pulsePink { fill: #ff4fd8; animation: pulse 2.4s ease-in-out infinite; }
      .pulseGreen { fill: #00ffa6; animation: pulse 1.8s ease-in-out infinite; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.28; }
      }
    </style>

    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <linearGradient id="beam" x1="54" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="0.48" stop-color="#00d4ff" stop-opacity="1" />
      <stop offset="1" stop-color="#ff4fd8" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect class="bg" width="1200" height="320" rx="10" />
  <rect x="10" y="10" width="1180" height="300" rx="8" class="frame" />
  <rect x="18" y="18" width="1164" height="284" rx="6" class="frame" opacity="0.35" />

  <line class="grid" x1="0" y1="58" x2="1200" y2="58" />
  <line class="grid" x1="0" y1="210" x2="1200" y2="210" />
  <line class="grid" x1="760" y1="58" x2="760" y2="286" />

  <line class="scan" x1="0" y1="18" x2="1200" y2="18" />
  <line class="scan" x1="0" y1="36" x2="1200" y2="36" />
  <line class="scan" x1="0" y1="54" x2="1200" y2="54" />
  <line class="scan" x1="0" y1="72" x2="1200" y2="72" />
  <line class="scan" x1="0" y1="90" x2="1200" y2="90" />
  <line class="scan" x1="0" y1="108" x2="1200" y2="108" />
  <line class="scan" x1="0" y1="126" x2="1200" y2="126" />
  <line class="scan" x1="0" y1="144" x2="1200" y2="144" />
  <line class="scan" x1="0" y1="162" x2="1200" y2="162" />
  <line class="scan" x1="0" y1="180" x2="1200" y2="180" />
  <line class="scan" x1="0" y1="198" x2="1200" y2="198" />
  <line class="scan" x1="0" y1="216" x2="1200" y2="216" />
  <line class="scan" x1="0" y1="234" x2="1200" y2="234" />
  <line class="scan" x1="0" y1="252" x2="1200" y2="252" />
  <line class="scan" x1="0" y1="270" x2="1200" y2="270" />
  <line class="scan" x1="0" y1="288" x2="1200" y2="288" />

  <polyline points="30,12 12,12 12,30" fill="none" class="accent" stroke-width="2" />
  <polyline points="1170,12 1188,12 1188,30" fill="none" class="accent" stroke-width="2" />
  <polyline points="30,308 12,308 12,290" fill="none" class="accent2" stroke-width="2" />
  <polyline points="1170,308 1188,308 1188,290" fill="none" class="accent2" stroke-width="2" />

  <circle class="pulseBlue" cx="1118" cy="38" r="4" />
  <circle class="pulsePink" cx="1136" cy="38" r="4" />
  <circle class="pulseGreen" cx="1154" cy="38" r="4" />

  <text class="label" x="30" y="40">// BIGIDRON_PROFILE</text>
  <text class="label" x="1060" y="40" text-anchor="end">SYSTEM ONLINE</text>

  <rect x="54" y="92" width="300" height="128" rx="8" fill="#07111a" opacity="0.48" />
  <rect x="66" y="104" width="276" height="104" rx="6" fill="#08131d" opacity="0.55" />
  <circle cx="114" cy="156" r="72" fill="#00d4ff" opacity="0.12" filter="url(#glowBlue)" />
  <circle cx="280" cy="110" r="54" fill="#ff4fd8" opacity="0.12" filter="url(#glowPink)" />

  <path d="M54 186C128 150 220 178 318 150C404 126 512 128 650 136" fill="none" stroke="url(#beam)" stroke-width="1.3" opacity="0.75">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M54 186C128 150 220 178 318 150C404 126 512 128 650 136;
              M54 170C150 140 222 136 320 160C430 188 530 120 650 128;
              M54 186C128 150 220 178 318 150C404 126 512 128 650 136" />
  </path>
  <path d="M54 202C162 176 250 198 336 184C446 166 554 154 708 162" fill="none" class="accent3" stroke-width="0.8" opacity="0.22">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M54 202C162 176 250 198 336 184C446 166 554 154 708 162;
              M54 188C154 168 240 178 336 196C450 216 548 140 708 150;
              M54 202C162 176 250 198 336 184C446 166 554 154 708 162" />
  </path>

  <g filter="url(#glowBlue)">
    <text class="titleGlow" x="56" y="166">Bigidron</text>
  </g>
  <text class="title" x="56" y="166">Bigidron</text>
  <text class="subtitle" x="60" y="198">RETRO TERMINAL  .  LUXURY CYBERPUNK  .  SYSTEMS THAT SHIP</text>

  <text class="status" x="794" y="94">AI ENGINEER</text>
  <text class="status" x="794" y="118">TRON  .  EVM  .  DEFI</text>
  <text class="status" x="794" y="142">FULL-STACK BUILDER</text>
  <text class="small" x="794" y="168">PREMIUM INTERFACES  /  AUTOMATION  /  PRODUCT EXECUTION</text>

  <rect x="794" y="186" width="104" height="22" rx="3" fill="#00d4ff" />
  <text class="chipText" x="846" y="201" text-anchor="middle">BLOCKCHAIN</text>
  <rect x="908" y="186" width="74" height="22" rx="3" fill="#00ffa6" />
  <text class="chipText" x="945" y="201" text-anchor="middle">AI OPS</text>
  <rect x="992" y="186" width="84" height="22" rx="3" fill="#ff4fd8" />
  <text class="chipText" x="1034" y="201" text-anchor="middle">NEXT.JS</text>

  <rect x="794" y="228" width="110" height="46" rx="6" fill="#08121b" stroke="#163042" stroke-width="1" />
  <text class="metricLabel" x="812" y="248">STATUS</text>
  <text class="metricValue" x="812" y="266">READY</text>

  <rect x="920" y="228" width="110" height="46" rx="6" fill="#08121b" stroke="#163042" stroke-width="1" />
  <text class="metricLabel" x="938" y="248">CHANNEL</text>
  <text class="metricValue" x="938" y="266">LIVE</text>

  <rect x="1046" y="228" width="110" height="46" rx="6" fill="#08121b" stroke="#163042" stroke-width="1" />
  <text class="metricLabel" x="1064" y="248">BUILD</text>
  <text class="metricValue" x="1064" y="266">V3.1</text>

  <text class="prompt" x="34" y="255">~</text>
  <text class="path" x="50" y="255">/bigidron</text>
  <text class="prompt" x="130" y="255">[</text>
  <text class="branch" x="138" y="255">main</text>
  <text class="prompt" x="172" y="255">]</text>
  <text class="prompt" x="186" y="255">&gt;</text>
  <text class="small" x="202" y="255">launch profile interface</text>
  <rect class="cursor" x="384" y="243" width="8" height="14" />

  <text class="small" x="34" y="292">LOGGED_IN_AS: BIGIDRON</text>
  <text class="small" x="1018" y="292">REGION: UA / STATUS: STABLE</text>
</svg>
