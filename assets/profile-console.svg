<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-labelledby="title desc">
  <title id="title">Bigidron pseudo console panel</title>
  <desc id="desc">A retro styled pseudo console panel placed under the profile banner.</desc>
  <defs>
    <style>
      .bg { fill: #05070b; }
      .frame { fill: none; stroke: #163042; stroke-width: 1; }
      .scan { stroke: #00ffa6; stroke-width: 0.4; opacity: 0.04; }
      .label { font-family: Consolas, 'Courier New', monospace; font-size: 12px; letter-spacing: 1.8px; fill: #7fd6ff; }
      .text { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #d6f3ff; }
      .muted { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #5e7180; }
      .green { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #00ffa6; }
      .blue { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #00d4ff; }
      .pink { font-family: Consolas, 'Courier New', monospace; font-size: 14px; fill: #ff4fd8; }
      .cursor { fill: #00d4ff; animation: blink 1.05s step-end infinite; }
      .dot { fill: #00ffa6; animation: pulse 2s ease-in-out infinite; }
      .divider { stroke: #10212f; stroke-width: 1; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="240" rx="10" />
  <rect x="10" y="10" width="1180" height="220" rx="8" class="frame" />
  <line class="divider" x1="0" y1="46" x2="1200" y2="46" />
  <line class="divider" x1="820" y1="46" x2="820" y2="230" />

  <line class="scan" x1="0" y1="22" x2="1200" y2="22" />
  <line class="scan" x1="0" y1="44" x2="1200" y2="44" />
  <line class="scan" x1="0" y1="66" x2="1200" y2="66" />
  <line class="scan" x1="0" y1="88" x2="1200" y2="88" />
  <line class="scan" x1="0" y1="110" x2="1200" y2="110" />
  <line class="scan" x1="0" y1="132" x2="1200" y2="132" />
  <line class="scan" x1="0" y1="154" x2="1200" y2="154" />
  <line class="scan" x1="0" y1="176" x2="1200" y2="176" />
  <line class="scan" x1="0" y1="198" x2="1200" y2="198" />
  <line class="scan" x1="0" y1="220" x2="1200" y2="220" />

  <circle class="dot" cx="1150" cy="28" r="4" />
  <text class="label" x="28" y="31">// CONSOLE_PANEL</text>
  <text class="label" x="1118" y="31" text-anchor="end">INTERACTIVE FEED</text>

  <text class="muted" x="34" y="74">$ whoami</text>
  <text class="green" x="34" y="98">Bigidron</text>

  <text class="muted" x="34" y="128">$ profile.focus --list</text>
  <text class="blue" x="34" y="152">01  AI systems and developer tooling</text>
  <text class="blue" x="34" y="174">02  TRON / EVM / DeFi product execution</text>
  <text class="blue" x="34" y="196">03  Premium interfaces with terminal-grade identity</text>

  <text class="muted" x="34" y="222">$ deploy --mode live</text>
  <rect class="cursor" x="202" y="210" width="8" height="14" />

  <text class="label" x="850" y="76">CURRENT STACK</text>
  <text class="text" x="850" y="102">TypeScript / Node.js / Next.js</text>
  <text class="text" x="850" y="126">TRON / EVM / DeFi tooling</text>
  <text class="text" x="850" y="150">Automation / product systems</text>

  <text class="label" x="850" y="188">PROFILE STATUS</text>
  <text class="pink" x="850" y="212">READY_FOR_DEPLOYMENT</text>
</svg>
